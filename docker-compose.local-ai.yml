# Trading Forge — Local AI Stack
# Ollama (GPU), Redis (Upstash-compatible), pgvector extension
#
# Usage:
#   docker compose -f docker-compose.local-ai.yml up -d
#   docker compose -f docker-compose.local-ai.yml down
#
# ─── Port Allocation ────────────────────────────────────────────
#   11434  Ollama LLM API (this file)
#            WARNING: Native Ollama also binds 11434. You CANNOT run
#            both native Ollama and Docker Ollama simultaneously.
#            Stop native Ollama before starting this stack, or vice versa.
#   6379   Redis (session cache + job queue)
#   5433   PostgreSQL + pgvector (mapped from container 5432 to avoid
#            conflict with any host-level PostgreSQL on 5432)
#   3000   Grafana (docker-compose in docker/ dir) — conflicts with
#            n8n-mcp if both run on 3000. Grafana is in a separate
#            compose file; adjust one if running both.
# ────────────────────────────────────────────────────────────────

services:

  # ─── Ollama — Local LLM server ───────────────────────────────────
  # Models: trading-quant (qwen3-coder:30b), llama3.1:8b (critic)
  ollama:
    image: ollama/ollama:latest
    container_name: trading-forge-ollama
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
      - ./ollama:/modelfiles:ro
    environment:
      - OLLAMA_KEEP_ALIVE=24h
      - OLLAMA_MAX_LOADED_MODELS=1
    deploy:
      resources:
        limits:
          memory: 20g
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434/api/tags"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ─── Redis — Session cache + job queue ───────────────────────────
  # Drop-in replacement for Upstash Redis (same API)
  redis:
    image: redis:7-alpine
    container_name: trading-forge-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes --maxmemory 512mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  # ─── PostgreSQL + pgvector — Local dev database ──────────────────
  # Use this for local dev only; prod uses Railway PostgreSQL
  postgres-local:
    image: pgvector/pgvector:pg16
    container_name: trading-forge-postgres-local
    restart: unless-stopped
    ports:
      - "5433:5432"           # 5433 to avoid conflict with local postgres
    volumes:
      - postgres_local_data:/var/lib/postgresql/data
      - ./scripts/init-pgvector.sql:/docker-entrypoint-initdb.d/01-pgvector.sql:ro
    environment:
      POSTGRES_DB: trading_forge
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: localdev
    deploy:
      resources:
        limits:
          memory: 2g
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d trading_forge"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Trading Forge API — Express server (optional containerised mode) ─
  # Uncomment to run Express inside Docker with auto-restart.
  # For local dev, prefer PM2: npx pm2 start pm2.config.cjs
  # trading-forge:
  #   build: .
  #   container_name: trading-forge-api
  #   restart: unless-stopped
  #   ports:
  #     - "4000:4000"
  #   env_file: .env
  #   depends_on:
  #     postgres-local:
  #       condition: service_healthy
  #     redis:
  #       condition: service_healthy
  #   deploy:
  #     resources:
  #       limits:
  #         memory: 4g
  #   healthcheck:
  #     test: ["CMD", "curl", "-f", "http://localhost:4000/api/health"]
  #     interval: 30s
  #     timeout: 10s
  #     retries: 3

volumes:
  ollama_data:
    driver: local
  redis_data:
    driver: local
  postgres_local_data:
    driver: local
