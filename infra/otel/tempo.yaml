# G5.3 — Minimal Grafana Tempo configuration for Trading Forge.
# Local filesystem storage — traces survive container restarts via the
# tempo-data Docker volume. No object-store credentials required.

server:
  http_listen_port: 3200

distributor:
  receivers:
    otlp:
      protocols:
        grpc:
          endpoint: 0.0.0.0:4317

ingester:
  max_block_duration: 5m

compactor:
  compaction:
    block_retention: 336h  # 14 days

storage:
  trace:
    backend: local
    local:
      path: /var/tempo/traces
    wal:
      path: /var/tempo/wal
